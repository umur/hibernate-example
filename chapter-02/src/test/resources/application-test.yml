# Test profile for Chapter 2 @SpringBootTest tests.
# Flyway is disabled in tests; Hibernate creates/drops the schema via ddl-auto.
spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
  flyway:
    enabled: false
