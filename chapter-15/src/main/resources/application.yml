spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cinetrack
    username: cinetrack
    password: cinetrack
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Enable Hibernate statistics so query counts are observable in tests
        generate_statistics: true
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: metrics,health
