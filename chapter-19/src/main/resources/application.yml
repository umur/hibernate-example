spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cinetrack_ch19}
    username: ${DB_USER:cinetrack}
    password: ${DB_PASS:cinetrack}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
